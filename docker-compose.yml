services:
  metatube-csv:
    build: .
    container_name: metatube-csv
    ports:
      - "8000:8000"
    volumes:
      # 挂载数据目录（包含 CSV 和 SQLite 数据库）
      - ./data:/data
    restart: always
    env_file:
      - .env
    environment:
      - TZ=Asia/Shanghai
    # 所有路径和配置在 .env 中管理，数据库路径默认与 CSV 同名（.db 后缀）
    command: ["--csv", "${CSV_PATH:-/data/BB_Magnet.csv}", "--port", "8000", "--fallback", "${FALLBACK_URL:-}", "--token", "${TOKEN:-}"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
